<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SG Analytics V11.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .active-lie { background-color: #1d4ed8 !important; color: white !important; font-weight: 800; }
        #s-list, #v-trends-content { flex: 1; overflow-y: auto; padding-bottom: 100px; -webkit-overflow-scrolling: touch; }
        .sticky-top { position: sticky; top: 0; z-index: 50; background-color: #f1f5f9; padding-bottom: 10px; }
        .font-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .btn-penalty { background-color: #be123c; color: white; } /* Rose-700 */
    </style>
</head>
<body class="p-4 font-sans text-slate-800">

    <div class="max-w-md mx-auto flex flex-col h-full w-full">
        <div class="sticky-top">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="text-xl font-black text-blue-700 tracking-tighter uppercase">SG Analytics V11.1</h1>
                    <p id="h-label" class="text-[10px] font-bold text-slate-400 uppercase">Hole 1</p>
                </div>
                <div class="flex bg-slate-200 p-1 rounded-lg">
                    <button onclick="goView('entry')" id="nav-entry" class="text-[10px] font-bold px-4 py-2 rounded-md bg-white">ENTRY</button>
                    <button onclick="goView('trends')" id="nav-trends" class="text-[10px] font-bold px-4 py-2 rounded-md">TRENDS</button>
                </div>
            </div>

            <div id="v-entry-controls" class="card p-4 mb-2">
                <div class="grid grid-cols-3 gap-2 mb-3">
                    <button onclick="setL('Tee')" id="l-Tee" class="l-btn active-lie bg-slate-100 p-2 rounded-xl text-sm font-bold">Tee</button>
                    <button onclick="setL('Fairway')" id="l-Fairway" class="l-btn bg-slate-100 p-2 rounded-xl text-sm font-bold">Fairway</button>
                    <button onclick="setL('Rough')" id="l-Rough" class="l-btn bg-slate-100 p-2 rounded-xl text-sm font-bold">Rough</button>
                    <button onclick="setL('Sand')" id="l-Sand" class="l-btn bg-slate-100 p-2 rounded-xl text-sm font-bold">Sand</button>
                    <button onclick="setL('Green')" id="l-Green" class="l-btn bg-slate-100 p-2 rounded-xl col-span-2 text-[10px] uppercase font-bold tracking-widest">Green (Feet)</button>
                </div>
                <input id="d-in" type="number" inputmode="numeric" placeholder="Distance" class="w-full text-3xl font-black border-b-4 border-slate-100 outline-none focus:border-blue-500 py-1 mb-4 text-center">
                <div class="flex gap-2 mb-2">
                    <button onclick="doRecord()" class="flex-[3] bg-blue-700 text-white py-3 rounded-xl font-black text-md shadow-lg uppercase active:bg-blue-800">Record Shot</button>
                    <button onclick="doPenalty()" class="flex-1 btn-penalty rounded-xl font-black text-[10px] uppercase shadow-lg active:bg-rose-900">Penalty</button>
                </div>
                <div class="flex gap-2">
                    <button onclick="doHoled()" class="flex-[3] bg-emerald-600 text-white py-3 rounded-xl font-black uppercase shadow-md text-sm active:bg-emerald-700">✓ Holed</button>
                    <button onclick="doUndo()" class="flex-1 bg-slate-200 text-slate-600 rounded-xl font-bold text-[10px] uppercase">Undo</button>
                </div>
            </div>
        </div>

        <div id="v-entry" class="flex flex-col flex-1 overflow-hidden">
            <div id="s-list"></div>
            <button onclick="doSave()" id="s-btn" class="hidden fixed bottom-6 left-4 right-4 max-w-md mx-auto bg-emerald-700 text-white py-4 rounded-2xl font-black uppercase shadow-2xl z-50">Save Round</button>
        </div>

        <div id="v-trends" class="hidden flex-1 flex flex-col overflow-hidden">
            <div id="v-trends-content">
                <div class="card p-4 mb-4"><canvas id="main-chart"></canvas></div>
                <div id="roadmap-box" class="card p-5 bg-blue-900 text-white mb-6"></div>
                <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 px-1 text-center italic">Last 5 Rounds (Rolling)</h3>
                <div id="round-history" class="space-y-2 mb-10"></div>
                <button onclick="doWipe()" class="w-full text-[10px] font-bold text-slate-400 uppercase py-6 tracking-widest opacity-50">Wipe All Data</button>
            </div>
        </div>
    </div>

    <script>
        var shots = [];
        var lie = 'Tee';
        var hole = 1;
        var chart = null;
        var expRound = null;

        var table = {
            'Tee': { 500:4.6, 400:4.4, 350:4.2, 200:3.6, 150:3.3, 0:0 },
            'Fairway': { 500:4.5, 400:4.2, 300:3.8, 200:3.4, 150:3.1, 100:2.9, 50:2.7, 20:2.5, 0:0 },
            'Rough': { 500:4.7, 400:4.4, 300:4.0, 200:3.6, 150:3.3, 100:3.1, 50:2.9, 20:2.7, 0:0 },
            'Sand': { 100:3.6, 50:3.2, 30:3.0, 20:2.8, 10:2.5, 0:0 },
            'Green': { 60:2.3, 30:2.0, 20:1.85, 10:1.6, 5:1.3, 3:1.1, 1:1.0, 0:0 }
        };

        function goView(v) {
            document.getElementById('v-entry').classList.toggle('hidden', v !== 'entry');
            document.getElementById('v-entry-controls').classList.toggle('hidden', v !== 'entry');
            document.getElementById('v-trends').classList.toggle('hidden', v !== 'trends');
            document.getElementById('nav-entry').classList.toggle('bg-white', v === 'entry');
            document.getElementById('nav-trends').classList.toggle('bg-white', v === 'trends');
            if (v === 'trends') renderTrends();
        }

        function setL(l) {
            lie = l;
            document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('active-lie'));
            document.getElementById('l-' + l).classList.add('active-lie');
        }

        function getVal(l, d) {
            var dta = table[l];
            var ks = Object.keys(dta).map(Number).sort((a,b)=>b-a);
            if (d >= ks[0]) return dta[ks[0]];
            if (d <= ks[ks.length-1]) return dta[ks[ks.length-1]];
            for (var i=0; i<ks.length-1; i++) {
                if (d <= ks[i] && d >= ks[i+1]) return dta[ks[i+1]] + (dta[ks[i]]-dta[ks[i+1]]) * (d-ks[i+1]) / (ks[i]-ks[i+1]);
            }
            return 2.5;
        }

        function doRecord() {
            var inp = document.getElementById('d-in');
            if (!inp.value) return;
            var d = parseFloat(inp.value);
            var ev = getVal(lie, d);
            var ct = (lie === 'Tee') ? 'OTT' : (lie === 'Green' ? 'PUT' : (d <= 100 ? 'SHG' : 'APP'));
            if (shots.length > 0) {
                var prev = shots[shots.length-1];
                if (!prev.holed && prev.sg === null) prev.sg = prev.ev - ev - 1;
            }
            shots.push({ lie: lie, dist: d, ev: ev, cat: ct, sg: null, hole: hole, holed: false });
            inp.value = '';
            document.getElementById('s-btn').classList.remove('hidden');
            ui();
        }

        function doPenalty() {
            var type = confirm("Is this Out of Bounds / Stroke & Distance? (Cancel for Lateral/Water drop)");
            if (shots.length === 0) return;
            var last = shots[shots.length-1];
            
            if (type) { // OB - Stroke and Distance
                last.sg = -2.0; 
                last.label = "OB/Lost";
            } else { // Lateral / Penalty Area
                last.sg = -1.0;
                last.label = "Penalty Area";
            }
            ui();
        }

        function doHoled() {
            if (shots.length === 0) return;
            var last = shots[shots.length-1];
            if (last.holed) return;
            last.sg = last.ev - 1; 
            last.holed = true;
            hole++;
            document.getElementById('h-label').innerText = 'Hole ' + hole;
            setL('Tee');
            ui();
        }

        function doUndo() {
            if (shots.length === 0) return;
            var p = shots.pop();
            if (p.holed) { hole--; document.getElementById('h-label').innerText = 'Hole ' + hole; }
            if (shots.length > 0) shots[shots.length-1].sg = null;
            ui();
        }

        function ui() {
            var list = document.getElementById('s-list');
            var html = '';
            shots.forEach(s => {
                var isNeg = s.sg < 0;
                var color = s.sg > 0 ? 'text-emerald-600' : (isNeg ? 'text-rose-500' : 'text-slate-400');
                var lbl = s.label ? ` <span class="bg-rose-100 text-rose-700 text-[8px] px-1 rounded">${s.label}</span>` : '';
                html += `<div class="card p-4 flex justify-between items-center text-sm mb-1.5 border-l-4 border-blue-500">
                    <span><b class="text-blue-700 text-[10px] w-8 inline-block italic">H${s.hole}</b> ${s.lie} (${s.dist}${s.lie==='Green'?'ft':'y'})${lbl}</span>
                    <span class="font-black font-mono ${color}">${s.sg !== null ? (s.sg > 0 ? '+' : '') + s.sg.toFixed(2) : '--'}</span>
                </div>`;
            });
            list.innerHTML = html;
        }

        function doSave() {
            var h = JSON.parse(localStorage.getItem('sg_v11_final') || '[]');
            var t = { date: new Date().toLocaleDateString(), OTT:0, APP:0, SHG:0, PUT:0 };
            shots.forEach(s => { if(s.sg !== null) t[s.cat] += s.sg; });
            h.unshift(t);
            localStorage.setItem('sg_v11_final', JSON.stringify(h.slice(0, 5)));
            shots = []; hole = 1;
            document.getElementById('s-btn').classList.add('hidden');
            ui();
            alert("Rolling 5 Updated!");
        }

        function renderTrends() {
            var h = JSON.parse(localStorage.getItem('sg_v11_final') || '[]');
            if (h.length === 0) return;
            var avg = { OTT:0, APP:0, SHG:0, PUT:0 };
            h.forEach(r => { avg.OTT += r.OTT; avg.APP += r.APP; avg.SHG += r.SHG; avg.PUT += r.PUT; });
            var count = h.length;
            avg.OTT /= count; avg.APP /= count; avg.SHG /= count; avg.PUT /= count;
            if (chart) chart.destroy();
            chart = new Chart(document.getElementById('main-chart'), {
                type: 'bar',
                data: {
                    labels: ['OTT', 'APP', 'SHG', 'PUT'],
                    datasets: [{ data: [avg.OTT, avg.APP, avg.SHG, avg.PUT], backgroundColor: '#1d4ed8' }]
                },
                options: { plugins: { legend: false } }
            });
            var worst = ['OTT', 'APP', 'SHG', 'PUT'].reduce((a, b) => avg[a] < avg[b] ? a : b);
            document.getElementById('roadmap-box').innerHTML = `<p class="text-xs uppercase font-bold opacity-70">Rolling 5 Leak</p><p class="text-xl font-black uppercase">${worst} Improvement</p>`;
            var histHtml = '';
            h.forEach((r, idx) => {
                var total = r.OTT+r.APP+r.SHG+r.PUT;
                histHtml += `<div onclick="toggleR(${idx})" class="card p-4 ${expRound===idx?'border-blue-500':'opacity-60'}">
                    <div class="flex justify-between items-center text-xs font-bold">
                        <span>Round ${h.length - idx}</span><span class="${total>=0?'text-emerald-600':'text-rose-500'}">SG: ${total.toFixed(2)}</span>
                    </div>
                    ${expRound===idx?`<div class="grid grid-cols-2 gap-2 mt-2 pt-2 border-t text-[10px] font-mono"><div>Tee: ${r.OTT.toFixed(2)}</div><div>App: ${r.APP.toFixed(2)}</div><div>Short: ${r.SHG.toFixed(2)}</div><div>Putt: ${r.PUT.toFixed(2)}</div></div>`:''}
                </div>`;
            });
            document.getElementById('round-history').innerHTML = histHtml;
        }

        function toggleR(i) { expRound = (expRound === i) ? null : renderTrends(); }
        function doWipe() { if(confirm("Clear?")) { localStorage.removeItem('sg_v11_final'); location.reload(); } }
    </script>
</body>
</html>
