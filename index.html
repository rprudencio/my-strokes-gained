<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SG 10-HCP Analyst</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .card { background: white; border-radius: 1.2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .lie-btn { transition: all 0.2s; }
    </style>
</head>
<body class="p-4 font-sans text-slate-800 pb-24">

    <div class="max-w-md mx-auto">
        <header class="py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black text-blue-700 tracking-tighter uppercase">SG Analytics</h1>
                <p id="current-hole-display" class="text-[10px] font-bold text-slate-400 uppercase">Entering Hole 1</p>
            </div>
            <div class="flex gap-1 bg-slate-200 p-1 rounded-lg">
                <button onclick="showView('entry')" id="btn-entry" class="text-[10px] font-bold px-4 py-2 rounded-md bg-white shadow-sm transition-all">ENTRY</button>
                <button onclick="showView('trends')" id="btn-trends" class="text-[10px] font-bold px-4 py-2 rounded-md transition-all">TRENDS</button>
            </div>
        </header>

        <div id="view-entry">
            <div class="card p-6 mb-6 border-2 border-blue-50">
                <div class="grid grid-cols-3 gap-2 mb-4">
                    <button onclick="setLie('Tee')" id="lie-Tee" class="lie-btn bg-blue-600 text-white p-3 rounded-xl font-bold text-sm">Tee</button>
                    <button onclick="setLie('Fairway')" id="lie-Fairway" class="lie-btn bg-slate-100 p-3 rounded-xl font-bold text-sm">Fairway</button>
                    <button onclick="setLie('Rough')" id="lie-Rough" class="lie-btn bg-slate-100 p-3 rounded-xl font-bold text-sm">Rough</button>
                    <button onclick="setLie('Green')" id="lie-Green" class="lie-btn bg-slate-100 p-3 rounded-xl font-bold col-span-3 mt-1 text-[10px] uppercase tracking-[0.2em]">On Green (Feet)</button>
                </div>

                <input id="dist-input" type="number" inputmode="numeric" placeholder="Distance..." class="w-full text-4xl font-black border-b-4 border-slate-100 outline-none focus:border-blue-500 py-2 mb-6 text-center">
                
                <div class="flex gap-2">
                    <button onclick="addShot()" class="flex-[3] bg-blue-700 text-white py-5 rounded-2xl font-black shadow-lg active:scale-95 transition-transform text-lg">RECORD</button>
                    <button onclick="deleteLastShot()" class="flex-1 bg-slate-100 text-slate-500 flex items-center justify-center rounded-2xl active:bg-slate-200 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6" />
                        </svg>
                    </button>
                </div>
            </div>

            <div id="shot-list" class="space-y-2"></div>
            
            <button onclick="saveRound()" id="save-btn" class="hidden w-full mt-8 bg-emerald-600 text-white py-5 rounded-2xl font-black shadow-lg shadow-emerald-100 active:bg-emerald-700 transition-colors uppercase tracking-widest">Save Entire Round</button>
        </div>

        <div id="view-trends" class="hidden space-y-4">
            <div class="card p-4">
                <canvas id="trendsChart"></canvas>
            </div>
            <div id="goal-tracker" class="card p-5 bg-gradient-to-br from-blue-600 to-blue-800 text-white">
                <h3 class="text-[10px] font-bold uppercase opacity-70 mb-1 tracking-widest">Roadmap to 5-HCP</h3>
                <div id="goal-content"><p class="italic text-sm opacity-80 text-center py-2">Save a round to see your analytics.</p></div>
            </div>
            <button onclick="clearHistory()" class="w-full text-[10px] font-bold text-slate-300 uppercase py-10 tracking-[0.3em]">Wipe All History</button>
        </div>
    </div>

    <script>
        let roundShots = [];
        let currentLie = 'Tee';
        let chartInstance = null;
        let holeCounter = 1;

        const baseline = {
            'Tee': { 450: 4.5, 400: 4.3, 350: 4.1, 200: 3.6, 150: 3.3 },
            'Fairway': { 400: 4.2, 300: 3.8, 200: 3.4, 150: 3.2, 100: 2.9, 50: 2.7, 20: 2.5 },
            'Rough': { 400: 4.4, 300: 4.1, 200: 3.7, 150: 3.5, 100: 3.2, 50: 2.9, 20: 2.7 },
            'Green': { 60: 2.3, 30: 2.0, 20: 1.85, 10: 1.6, 5: 1.3, 3: 1.1 }
        };

        function setLie(lie) {
            currentLie = lie;
            document.querySelectorAll('.lie-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('bg-slate-100', 'text-slate-800');
            });
            const activeBtn = document.getElementById('lie-' + lie);
            activeBtn.classList.remove('bg-slate-100', 'text-slate-800');
            activeBtn.classList.add('bg-blue-600', 'text-white');
        }

        function getExpected(lie, dist) {
            const table = baseline[lie];
            const dists = Object.keys(table).map(Number).sort((a, b) => b - a);
            if (dist >= dists[0]) return table[dists[0]];
            if (dist <= dists[dists.length - 1]) return table[dists[dists.length - 1]];
