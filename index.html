<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SG Analyst</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .card { background: white; border-radius: 1.2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .lie-btn { background-color: #f1f5f9; color: #475569; transition: all 0.1s; }
        .active-lie { background-color: #1d4ed8 !important; color: white !important; }
    </style>
</head>
<body class="p-4 font-sans text-slate-800 pb-24">

    <div class="max-w-md mx-auto">
        <header class="py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black text-blue-700 uppercase">SG Analytics</h1>
                <p id="current-hole-display" class="text-[10px] font-bold text-slate-400 uppercase">Hole 1</p>
            </div>
            <div class="flex gap-1 bg-slate-200 p-1 rounded-lg">
                <button onclick="showView('entry')" id="btn-entry" class="text-[10px] font-bold px-4 py-2 rounded-md bg-white">ENTRY</button>
                <button onclick="showView('trends')" id="btn-trends" class="text-[10px] font-bold px-4 py-2 rounded-md">TRENDS</button>
            </div>
        </header>

        <div id="view-entry">
            <div class="card p-6 mb-6 border-2 border-blue-50">
                <div class="grid grid-cols-3 gap-2 mb-4">
                    <button onclick="updateLie('Tee')" id="lie-Tee" class="lie-btn active-lie p-3 rounded-xl font-bold text-sm">Tee</button>
                    <button onclick="updateLie('Fairway')" id="lie-Fairway" class="lie-btn p-3 rounded-xl font-bold text-sm">Fairway</button>
                    <button onclick="updateLie('Rough')" id="lie-Rough" class="lie-btn p-3 rounded-xl font-bold text-sm">Rough</button>
                    <button onclick="updateLie('Green')" id="lie-Green" class="lie-btn p-3 rounded-xl font-bold col-span-3 mt-1 text-[10px] uppercase">On Green (Feet)</button>
                </div>

                <input id="dist-input" type="number" inputmode="numeric" placeholder="Distance..." class="w-full text-4xl font-black border-b-4 border-slate-100 outline-none focus:border-blue-500 py-2 mb-6 text-center">
                
                <div class="space-y-3">
                    <div class="flex gap-2">
                        <button onclick="handleRecord()" class="flex-[4] bg-blue-700 text-white py-5 rounded-2xl font-black shadow-lg text-lg active:bg-blue-800">RECORD SHOT</button>
                        <button onclick="handleUndo()" class="flex-1 bg-slate-200 text-slate-600 flex items-center justify-center rounded-2xl active:bg-slate-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6" /></svg>
                        </button>
                    </div>
                    <button onclick="handleHoled()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-md uppercase tracking-widest active:bg-emerald-700">
                        ✓ Ball is Holed
                    </button>
                </div>
            </div>

            <div id="shot-display-list" class="space-y-2"></div>
            <button onclick="handleSave()" id="save-btn-ui" class="hidden w-full mt-8 bg-emerald-600 text-white py-5 rounded-2xl font-black uppercase">Save Round</button>
        </div>

        <div id="view-trends" class="hidden space-y-4">
            <div class="card p-4"><canvas id="mainChart"></canvas></div>
            <div id="goal-panel" class="card p-5 bg-blue-800 text-white"></div>
            <button onclick="handleClear()" class="w-full text-[10px] font-bold text-slate-300 uppercase py-10">Clear All History</button>
        </div>
    </div>

    <script>
        let shots = [];
        let lie = 'Tee';
        let hole = 1;
        let chart = null;

        const table = {
            'Tee': { 500: 4.6, 400: 4.3, 350: 4.1, 200: 3.6, 150: 3.3, 0: 0 },
            'Fairway': { 500: 4.5, 400: 4.2, 300: 3.8, 200: 3.4, 150: 3.2, 100: 2.9, 50: 2.7, 20: 2.5, 0: 0 },
            'Rough': { 500: 4.7, 400: 4.4, 300: 4.1, 200: 3.7, 150: 3.5, 100: 3.2, 50: 2.9, 20: 2.7, 0: 0 },
            'Green': { 100: 2.5, 60: 2.3, 30: 2.0, 20: 1.85, 10: 1.6, 5: 1.3, 3: 1.1, 0: 0 }
        };

        function updateLie(selection) {
            lie = selection;
            document.querySelectorAll('.lie-btn').forEach(b => b.classList.remove('active-lie'));
            document.getElementById('lie-' + selection).classList.add('active-lie');
        }

        function getE(l, d) {
            const data = table[l];
            const keys = Object.keys(data).map(Number).sort((a,b) => b-a);
            if (d >= keys[0]) return data[keys[0]];
            if (d <= keys[keys.length-1]) return data[keys[keys.length-1]];
            for (let i=0; i<keys.length-1; i++) {
                if (d <= keys[i] && d >= keys[i+1]) {
                    const d1=keys[i], d2=keys[i+1], v1=data[d1], v2=data[d2];
                    return v2 + (v1-v2) * (d-d2) / (d1-d2);
                }
            }
            return 2.5;
        }

        function handleRecord() {
            const input = document.getElementById('dist-input');
            if (!input.value) return;
            const dist = parseFloat(input.value);
            const exp = getE(lie, dist);
            let cat = (lie === 'Tee') ? 'OTT' : (lie === 'Green' ? 'PUT' : (dist <= 100 ? 'SHG' : 'APP'));

            if (shots.length > 0) {
                const prev = shots[shots.length - 1];
                if (!prev.isHoled) prev.sg = prev.exp - exp - 1;
            }

            shots.push({ lie, dist, exp, cat, sg: null, hole, isHoled: false });
            input.value = '';
            document.getElementById('save-btn-ui').classList.remove('hidden');
            render();
        }

        function handleHoled() {
            if (shots.length === 0) return;
            const lastShot = shots[shots.length - 1];
            if (lastShot.isHoled) return;

            // Math: Expected from last location - 0 (in hole) - 1 (the stroke just hit)
            lastShot.sg = lastShot.exp - 0 - 1;
            lastShot.isHoled = true;

            hole++;
            document.getElementById('current-hole-display').innerText = `Hole ${hole}`;
            updateLie('Tee');
            render();
        }

        function handleUndo() {
            if (shots.length === 0) return;
            const popped = shots.pop();
            if (popped.isHoled) {
                hole--;
                document.getElementById('current-hole-display').innerText = `Hole ${hole}`;
            }
            if (shots.length > 0) shots[shots.length-1].sg = null;
            render();
        }

        function render() {
            const box = document.getElementById('shot-display-list');
            let hLabel = 0;
            box.innerHTML = shots.map(s => {
                let header = "";
                if (s.hole !== hLabel) {
                    header = `<div class="text-[10px] font-bold text-slate-400 uppercase mt-4 border-b">Hole ${s.hole}</div>`;
                    hLabel = s.hole;
                }
                const sgVal = s.sg !== null ? (s.sg > 0 ? '+' : '') + s.sg.toFixed(2) : '--';
                const sgCol = s.sg > 0 ? 'text-emerald-600' : (s.sg < 0 ? 'text-rose-500' : 'text-slate-400');
                const holedTag = s.isHoled ? '<span class="ml-2 bg-emerald-100 text-emerald-700 text-[8px] px-1 rounded">HOLED</span>' : '';
                
                return `${header}<div class="card p-3 flex justify-between items-center text-sm mt-1">
                    <span><b class="text-blue-700 w-8 inline-block text-[10px]">${s.cat}</b> ${s.lie} (${s.dist}${s.lie==='Green'?'ft':'y'})${holedTag}</span>
                    <span class="font-bold ${sgCol}">${sgVal}</span>
                </div>`;
            }).join('');
        }

        function handleSave() {
            const h = JSON.parse(localStorage.getItem('sgHistory') || '[]');
            const t = { OTT:0, APP:0, SHG:0, PUT:0, date: new Date().toLocaleDateString() };
            shots.forEach(s => { if(s.sg !== null) t[s.cat] += s.sg; });
            h.push(t);
            localStorage.setItem('sgHistory', JSON.stringify(h.slice(-20)));
            shots = []; hole = 1;
            document.getElementById('current-hole-display').innerText = `Hole 1`;
            document.getElementById('save-btn-ui').classList.add('hidden');
            render();
            alert("Round Saved!");
        }

        function showView(v) {
            document.getElementById('view-entry').classList.toggle('hidden', v !== 'entry');
            document.getElementById('view-trends').classList.toggle('hidden', v !== 'trends');
            document.getElementById('btn-entry').classList.toggle('bg-white', v === 'entry');
            document.getElementById('btn-trends').classList.toggle('bg-white', v === 'trends');
            if (v === 'trends') renderTrends();
        }

        function renderTrends() {
            const h = JSON.parse(localStorage.getItem('sgHistory') || '[]');
            if (!h.length) return;
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (chart) chart.destroy();
            const last = h[h.length-1];
            const cats = ['OTT',
